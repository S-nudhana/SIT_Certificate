services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: hono-api
    ports:
      - "5000:5000"
    networks:
      - app-network
      - db-network
    environment:
      - NODE_ENV=production
      - PORT=5000

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: react-app
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

networks:
  app-network:
    driver: bridge
  db-network:
    external: true